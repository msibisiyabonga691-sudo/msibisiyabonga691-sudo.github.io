<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kgethi!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 25%, #f8b500 50%, #ff6b9d 75%, #c44569 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
        }
        
        .birthday-text {
            font-family: 'Pacifico', cursive;
            font-size: 5rem;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255, 105, 180, 0.8),
                0 0 20px rgba(255, 105, 180, 0.6),
                0 0 30px rgba(255, 105, 180, 0.4),
                0 0 40px rgba(255, 20, 147, 0.3),
                4px 4px 0px rgba(0,0,0,0.1);
            animation: bounceIn 1.5s ease-out, glowPulse 2s ease-in-out infinite alternate;
            margin-bottom: 20px;
        }
        
        .name-text {
            font-family: 'Pacifico', cursive;
            font-size: 7rem;
            background: linear-gradient(45deg, #fff, #ffe4e1, #fff0f5, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300% 300%;
            animation: shimmer 3s ease infinite, float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
            margin: 20px 0;
        }
        
        .sub-text {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: fadeInUp 2s ease-out 0.5s both;
            letter-spacing: 3px;
        }
        
        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.7;
        }
        
        .heart:nth-child(1) { left: 10%; animation-duration: 6s; animation-delay: 0s; font-size: 25px; }
        .heart:nth-child(2) { left: 20%; animation-duration: 8s; animation-delay: 1s; font-size: 15px; }
        .heart:nth-child(3) { left: 30%; animation-duration: 7s; animation-delay: 2s; font-size: 30px; }
        .heart:nth-child(4) { left: 40%; animation-duration: 9s; animation-delay: 0.5s; font-size: 20px; }
        .heart:nth-child(5) { left: 50%; animation-duration: 6.5s; animation-delay: 1.5s; font-size: 28px; }
        .heart:nth-child(6) { left: 60%; animation-duration: 7.5s; animation-delay: 2.5s; font-size: 18px; }
        .heart:nth-child(7) { left: 70%; animation-duration: 8.5s; animation-delay: 0.3s; font-size: 22px; }
        .heart:nth-child(8) { left: 80%; animation-duration: 6s; animation-delay: 1.8s; font-size: 26px; }
        .heart:nth-child(9) { left: 90%; animation-duration: 9s; animation-delay: 0.8s; font-size: 16px; }
        .heart:nth-child(10) { left: 5%; animation-duration: 7s; animation-delay: 3s; font-size: 24px; }
        .heart:nth-child(11) { left: 15%; animation-duration: 8s; animation-delay: 1.2s; font-size: 19px; }
        .heart:nth-child(12) { left: 25%; animation-duration: 6.5s; animation-delay: 2.8s; font-size: 27px; }
        .heart:nth-child(13) { left: 35%; animation-duration: 7.5s; animation-delay: 0.6s; font-size: 21px; }
        .heart:nth-child(14) { left: 45%; animation-duration: 8s; animation-delay: 1.9s; font-size: 23px; }
        .heart:nth-child(15) { left: 55%; animation-duration: 6s; animation-delay: 3.5s; font-size: 17px; }
        .heart:nth-child(16) { left: 65%; animation-duration: 9s; animation-delay: 0.2s; font-size: 29px; }
        .heart:nth-child(17) { left: 75%; animation-duration: 7s; animation-delay: 2.1s; font-size: 20px; }
        .heart:nth-child(18) { left: 85%; animation-duration: 8.5s; animation-delay: 1.1s; font-size: 25px; }
        .heart:nth-child(19) { left: 95%; animation-duration: 6.5s; animation-delay: 0.9s; font-size: 18px; }
        .heart:nth-child(20) { left: 50%; animation-duration: 10s; animation-delay: 4s; font-size: 32px; }
        
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: sparkleAnim 2s ease-in-out infinite;
            box-shadow: 0 0 10px #fff, 0 0 20px #ff69b4;
        }
        
        .sparkle:nth-child(21) { top: 20%; left: 20%; animation-delay: 0s; }
        .sparkle:nth-child(22) { top: 30%; left: 80%; animation-delay: 0.5s; }
        .sparkle:nth-child(23) { top: 70%; left: 30%; animation-delay: 1s; }
        .sparkle:nth-child(24) { top: 15%; left: 60%; animation-delay: 1.5s; }
        .sparkle:nth-child(25) { top: 80%; left: 70%; animation-delay: 0.3s; }
        .sparkle:nth-child(26) { top: 40%; left: 10%; animation-delay: 0.8s; }
        .sparkle:nth-child(27) { top: 60%; left: 90%; animation-delay: 1.2s; }
        .sparkle:nth-child(28) { top: 25%; left: 45%; animation-delay: 0.6s; }
        .sparkle:nth-child(29) { top: 85%; left: 15%; animation-delay: 1.8s; }
        .sparkle:nth-child(30) { top: 50%; left: 50%; animation-delay: 0.2s; }
        
        .balloon {
            position: absolute;
            bottom: -100px;
            animation: balloonRise linear infinite;
            font-size: 40px;
        }
        
        .balloon:nth-child(31) { left: 15%; animation-duration: 12s; animation-delay: 0s; }
        .balloon:nth-child(32) { left: 35%; animation-duration: 14s; animation-delay: 2s; }
        .balloon:nth-child(33) { left: 55%; animation-duration: 11s; animation-delay: 4s; }
        .balloon:nth-child(34) { left: 75%; animation-duration: 13s; animation-delay: 1s; }
        .balloon:nth-child(35) { left: 25%; animation-duration: 15s; animation-delay: 3s; }
        .balloon:nth-child(36) { left: 85%; animation-duration: 12s; animation-delay: 5s; }
        .balloon:nth-child(37) { left: 5%; animation-duration: 14s; animation-delay: 2.5s; }
        .balloon:nth-child(38) { left: 45%; animation-duration: 11s; animation-delay: 1.5s; }
        .balloon:nth-child(39) { left: 65%; animation-duration: 13s; animation-delay: 4.5s; }
        .balloon:nth-child(40) { left: 95%; animation-duration: 15s; animation-delay: 0.5s; }
        
        .cake {
            font-size: 80px;
            animation: cakeBounce 2s ease-in-out infinite;
            margin-top: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall linear infinite;
        }
        
        .confetti:nth-child(41) { left: 5%; background: #ff69b4; animation-duration: 5s; animation-delay: 0s; }
        .confetti:nth-child(42) { left: 15%; background: #ffd700; animation-duration: 6s; animation-delay: 0.5s; }
        .confetti:nth-child(43) { left: 25%; background: #ff1493; animation-duration: 4.5s; animation-delay: 1s; }
        .confetti:nth-child(44) { left: 35%; background: #00ced1; animation-duration: 5.5s; animation-delay: 1.5s; }
        .confetti:nth-child(45) { left: 45%; background: #ff6347; animation-duration: 4s; animation-delay: 2s; }
        .confetti:nth-child(46) { left: 55%; background: #da70d6; animation-duration: 6s; animation-delay: 0.3s; }
        .confetti:nth-child(47) { left: 65%; background: #ffa500; animation-duration: 5s; animation-delay: 0.8s; }
        .confetti:nth-child(48) { left: 75%; background: #ff69b4; animation-duration: 4.5s; animation-delay: 1.3s; }
        .confetti:nth-child(49) { left: 85%; background: #ffd700; animation-duration: 5.5s; animation-delay: 1.8s; }
        .confetti:nth-child(50) { left: 95%; background: #ff1493; animation-duration: 6s; animation-delay: 2.3s; }
        
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px rgba(255, 105, 180, 0.8), 0 0 20px rgba(255, 105, 180, 0.6), 0 0 30px rgba(255, 105, 180, 0.4); }
            100% { text-shadow: 0 0 20px rgba(255, 105, 180, 1), 0 0 40px rgba(255, 105, 180, 0.8), 0 0 60px rgba(255, 20, 147, 0.6), 0 0 80px rgba(255, 20, 147, 0.4); }
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        @keyframes balloonRise {
            0% { transform: translateY(0) rotate(-5deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(5deg); opacity: 0; }
        }
        
        @keyframes cakeBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        .star {
            position: absolute;
            color: #ffd700;
            font-size: 30px;
            animation: starTwinkle 1.5s ease-in-out infinite alternate;
        }
        
        .star:nth-child(51) { top: 10%; left: 10%; animation-delay: 0s; }
        .star:nth-child(52) { top: 15%; left: 85%; animation-delay: 0.3s; }
        .star:nth-child(53) { top: 80%; left: 20%; animation-delay: 0.6s; }
        .star:nth-child(54) { top: 75%; left: 80%; animation-delay: 0.9s; }
        .star:nth-child(55) { top: 5%; left: 50%; animation-delay: 1.2s; }
        .star:nth-child(56) { top: 90%; left: 50%; animation-delay: 0.4s; }
        .star:nth-child(57) { top: 30%; left: 5%; animation-delay: 0.7s; }
        .star:nth-child(58) { top: 35%; left: 95%; animation-delay: 1s; }
        
        @keyframes starTwinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        .ribbon {
            position: absolute;
            width: 100px;
            height: 20px;
            background: linear-gradient(90deg, #ff69b4, #ffd700, #ff69b4);
            border-radius: 10px;
            animation: ribbonWave 3s ease-in-out infinite;
        }
        
        .ribbon:nth-child(59) { top: 10%; left: -100px; animation-delay: 0s; }
        .ribbon:nth-child(60) { top: 30%; right: -100px; animation-delay: 1s; }
        .ribbon:nth-child(61) { top: 60%; left: -100px; animation-delay: 2s; }
        .ribbon:nth-child(62) { top: 80%; right: -100px; animation-delay: 0.5s; }
        
        @keyframes ribbonWave {
            0% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(calc(100vw + 100px)) rotate(180deg); }
            100% { transform: translateX(0) rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .birthday-text { font-size: 3rem; }
            .name-text { font-size: 4rem; }
            .sub-text { font-size: 1.2rem; }
            .cake { font-size: 50px; }
        }
    </style>
</head>
